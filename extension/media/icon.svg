<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#262B35"/>
      <stop offset="1" stop-color="#14161B"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E58A68"/>
      <stop offset="1" stop-color="#CC6B4A"/>
    </linearGradient>
  </defs>

  <!-- nền -->
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- sóng kết nối (remote) -->
  <g stroke="url(#coral)" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M 180 64 a 24 24 0 0 1 24 24" opacity="0.55"/>
    <path d="M 180 42 a 46 46 0 0 1 46 46" opacity="0.9"/>
  </g>
  <circle cx="180" cy="88" r="7" fill="url(#coral)"/>

  <!-- điện thoại -->
  <rect x="60" y="50" width="104" height="168" rx="20" fill="#0E1014" stroke="#E7E4DF" stroke-width="7"/>
  <rect x="96" y="64" width="32" height="6" rx="3" fill="#3A3F4A"/>

  <!-- bubble agent (terminal >_) -->
  <rect x="74" y="86" width="52" height="30" rx="9" fill="#343A46"/>
  <path d="M 82 94 l 8 7 -8 7" stroke="#E7E4DF" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="96" y="106" width="14" height="4.5" rx="2.25" fill="#E7E4DF"/>

  <!-- bubble duyệt quyền (Allow ✓) -->
  <rect x="94" y="128" width="56" height="34" rx="10" fill="url(#coral)"/>
  <path d="M 108 145 l 8 8 16 -16" stroke="#FFF7F2" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- bubble đang gõ -->
  <rect x="74" y="172" width="40" height="22" rx="8" fill="#343A46"/>
  <circle cx="86" cy="183" r="3" fill="#9AA1AD"/>
  <circle cx="96" cy="183" r="3" fill="#9AA1AD"/>
  <circle cx="106" cy="183" r="3" fill="#9AA1AD"/>

  <!-- home indicator -->
  <rect x="98" y="202" width="28" height="5" rx="2.5" fill="#3A3F4A"/>
</svg>
