name: Release

# Tag-based release (giống anime-companion-vscode): push tag vX.Y.Z để publish.
# Khác biệt: vsix chứa CLI Claude Code theo nền tảng → build matrix platform-specific.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            extension/package-lock.json
            webapp/package-lock.json

      - name: Install dependencies
        run: |
          npm --prefix extension ci
          npm --prefix webapp ci

      - name: Verify tag matches extension/package.json version
        shell: bash
        run: |
          pkg_version=$(node -p "require('./extension/package.json').version")
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Tag $tag_version does not match extension/package.json version $pkg_version" >&2
            exit 1
          fi

      - name: Typecheck + unit tests
        run: |
          npm --prefix extension run typecheck
          npm --prefix webapp run typecheck
          npm --prefix extension test

      - name: Build
        run: npm run build

  package:
    needs: test
    runs-on: ubuntu-latest
    # secrets không dùng được trong `if` của step — map vào env cấp job rồi check env
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: win32
            cpu: x64
          - target: linux-x64
            os: linux
            cpu: x64
          - target: darwin-x64
            os: darwin
            cpu: x64
          - target: darwin-arm64
            os: darwin
            cpu: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            extension/package-lock.json
            webapp/package-lock.json

      - name: Install & build
        run: |
          npm --prefix extension ci
          npm --prefix webapp ci
          npm run build

      # Agent SDK kéo CLI Claude theo nền tảng qua optional deps —
      # cài lại theo os/cpu của target để vsix chứa đúng binary.
      - name: Swap SDK platform binaries (${{ matrix.target }})
        run: npm --prefix extension install --force --os=${{ matrix.os }} --cpu=${{ matrix.cpu }}

      - name: Package ${{ matrix.target }}
        working-directory: extension
        run: npx vsce package --target ${{ matrix.target }} --out ../mobile-code-companion-${{ github.ref_name }}-${{ matrix.target }}.vsix

      - name: Publish to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: extension
        run: npx vsce publish --packagePath ../mobile-code-companion-${{ github.ref_name }}-${{ matrix.target }}.vsix

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: extension
        run: npx ovsx publish ../mobile-code-companion-${{ github.ref_name }}-${{ matrix.target }}.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all vsix
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
